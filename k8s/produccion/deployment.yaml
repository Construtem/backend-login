apiVersion: apps/v1
kind: Deployment
metadata:
  name: back-login
spec:
  replicas: 1
  selector:
    matchLabels:
      app: back-login
  template:
    metadata:
      labels:
        app: back-login
    spec:
      containers:
        - name: back-login
        # Pendiente: utilizar forma de no hardcodear la imagen y actualizar versiones
          image: southamerica-east1-docker.pkg.dev/construtem/microservicios-construtem/back-login:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          # Aqui se muestran las variables de entorno que se definieron en los secretos
          # Especificamente se encuentran solo las de la base de datos
          envFrom:
            - secretRef:
                name: back-login-secrets
            # Revisar bien los recursos a utilizar para no usar demas y que no se acaben los creditos gcp xd
          resources:
            requests:
              memory: "64Mi"
              cpu: "250m"
            limits:
              memory: "128Mi"
              cpu: "500m"
